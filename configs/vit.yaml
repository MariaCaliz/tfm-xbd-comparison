# ============================================================
# Configuración del experimento: ViT-Base/16
# Hereda de configs/base.yaml y sobrescribe lo específico.
# ============================================================

inherits: base.yaml

experiment:
  name: vit_xbd
  description: >
    Fine-tuning de ViT-Base/16 (preentrenado en ImageNet) sobre xBD
    para clasificación de daños en 4 niveles.

model:
  name: vit
  pretrained: true
  pretrained_source: imagenet
  input_size: 224
  num_classes: 4
  dropout: 0.2

training:
  stage2:
    unfreeze_last_n_blocks: 2  # Descongela los dos últimos bloques Transformer + norm
